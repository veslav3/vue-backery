apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: vue-backery-frontend:local
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: API_URL
          value: "http://backend:3000"
        - name: NUXT_PUBLIC_API_BASE
          value: "http://backend:3000"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30001
